<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AuraSound - Premium Audiophile Music Application">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AuraSound">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A0A0F">
  <title>AuraSound</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #0A0A0F;
      margin: 0;
      padding: 0;
    }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0A0F;
      z-index: 9999;
    }
    .loader-ring {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 3px solid #2A2A3A;
      border-top-color: #7C6FFF;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      color: #4A4A65;
      font-family: sans-serif;
      font-size: 13px;
      margin-top: 16px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-ring"></div>
    <div class="loader-text">AURASOUND</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      const loader = document.getElementById('loading');
      if (loader) loader.style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

name: aurasound
description: AuraSound - Premium Audiophile Music Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ─────────────────────────────────────────────────────────────
  # Video Player
  # ─────────────────────────────────────────────────────────────
  video_player: ^2.8.6
  chewie: ^1.8.5

  # ─────────────────────────────────────────────────────────────
  # State Management
  # ─────────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # IMPORTANT:
  # Must match riverpod_generator compatibility
  riverpod_annotation: 2.6.1

  # ─────────────────────────────────────────────────────────────
  # Audio Engine
  # ─────────────────────────────────────────────────────────────
  just_audio: ^0.9.38
  just_audio_background: ^0.0.1-beta.13
  audio_service: ^0.18.14
  audio_session: ^0.1.19
  on_audio_query: ^2.9.0

  # ─────────────────────────────────────────────────────────────
  # YouTube Streaming
  # ─────────────────────────────────────────────────────────────
  youtube_explode_dart: ^2.3.4

  # ─────────────────────────────────────────────────────────────
  # Database / Local Storage
  # ─────────────────────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # ─────────────────────────────────────────────────────────────
  # Navigation
  # ─────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ─────────────────────────────────────────────────────────────
  # UI / Animations
  # ─────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  palette_generator: ^0.3.3+4
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  percent_indicator: ^4.2.3

  # ─────────────────────────────────────────────────────────────
  # Charts / Visualizer
  # ─────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ─────────────────────────────────────────────────────────────
  # Permissions
  # ─────────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ─────────────────────────────────────────────────────────────
  # File System
  # ─────────────────────────────────────────────────────────────
  path_provider: ^2.1.4
  file_picker: ^8.0.7
  path: ^1.9.0

  # ─────────────────────────────────────────────────────────────
  # Networking
  # ─────────────────────────────────────────────────────────────
  http: ^1.2.2
  crypto: ^3.0.5
  connectivity_plus: ^6.0.5

  # ─────────────────────────────────────────────────────────────
  # Utilities
  # ─────────────────────────────────────────────────────────────
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # flutter_localizations requires intl 0.20.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # ─────────────────────────────────────────────────────────────
  # Code Generation
  # ─────────────────────────────────────────────────────────────
  build_runner: ^2.4.9

  freezed: ^2.5.2

  # IMPORTANT:
  # Hive Generator only supports analyzer <7.0.0
  hive_generator: ^2.0.1

  # IMPORTANT:
  # Pin Riverpod generator to analyzer 6.x compatible version
  riverpod_generator: 2.4.0

  json_serializable: ^6.7.1

dependency_overrides:
  analyzer: ^6.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf

        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500

        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600

        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800